# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# avply 設定ファイル
##################################################
# ローカル PC 固有のパスは avply.local.toml に記載すると、
# このファイルの値を後勝ちで上書きできる（VCS 管理外）。

# ffmpeg 設定
[ffmpeg]
# ffmpeg.exe のフルパス
# 動画変換に使用する ffmpeg.exe を指定する。
path = ""

# シーク設定
[seek]
# 左カーソルキーで巻き戻すミリ秒数
# 動画の再生位置をこの値だけ前に戻す。0 以下にするとシーク無効。デフォルトは 5000。
left_ms = 5000
# 右カーソルキーで早送るミリ秒数
# 動画の再生位置をこの値だけ後ろに進める。0 以下にするとシーク無効。デフォルトは 5000。
right_ms = 5000
# マウスホイール前転（上スクロール）で早送るミリ秒数
# シークバーおよびプレビュー領域のホイールに適用する。0 以下にするとシーク無効。デフォルトは 5000。
wheel_forward_ms = 5000
# マウスホイール後転（下スクロール）で巻き戻すミリ秒数
# シークバーおよびプレビュー領域のホイールに適用する。0 以下にするとシーク無効。デフォルトは 5000。
wheel_back_ms = 5000

# 再生設定
[playback]
# 動画読込時の初期再生速度
# 1.00 で等速、0.05 単位で上下キーから調整可能。デフォルトは 1.00。
speed = 1.00
# QMediaPlayer の FFmpeg バックエンドに渡す HW デコーダ優先順位
# カンマ区切りで複数指定可能。空文字にすると Qt 自動選択になる。
# GPU 非搭載環境やドライバ非対応の場合、Qt/ffmpeg が自動的に CPU デコードへフォールバックするため未調整でも動作する。
# デフォルトは "d3d11va,cuda"（Windows 共通の Direct3D 11 VA を最優先）。
hw_decoder_priority = "d3d11va,cuda"
# シークバーホバー時のサムネイル抽出に用いる ffmpeg -hwaccel の値
# "auto" / "d3d11va" / "cuda" 等を指定する。"none" または空文字で -hwaccel 指定をスキップする。
# デフォルトは "auto"。
thumbnail_hwaccel = "auto"

# ウィンドウ設定
[window]
# 動画読込時の初期ウィンドウサイズ上限のモニタ比率
# モニタ作業領域（タスクバー除外）に対するウィンドウ幅・高さの上限比率を指定する。
# 例：0.7 ならモニタの 70% を上限としてアスペクト比維持で縮める。デフォルトは 0.7。
# 0.1〜1.0 にクランプされる（範囲外は近い境界値に丸める）。
initial_screen_ratio = 0.7

# 音声設定
[audio]
# 再生音量
# 1.00 で 100%、0.50 で 50%。再生中は Shift+カーソルキー（上下）で 0.05 単位で調整できる。
# 0.00〜1.00 にクランプされる（範囲外は近い境界値に丸める）。デフォルトは 1.00。
volume = 1.00
# サイレンストーン有効/無効
# Bluetooth ヘッドセットのアイドル復帰時プチノイズ抑制のための常時不可聴トーン出力。
# スピーカー環境や有線 DAC 環境では false にして OS への常時音声出力を停止できる。デフォルトは true。
silence_tone_enabled = true
# サイレンストーンの周波数（Hz）
# 20〜20000 にクランプされる。1 kHz は BT コーデックの確実なパスバンド内でコーデックをアクティブ状態に保つ。
# デフォルトは 1000.0。
silence_tone_freq_hz = 1000.0
# サイレンストーンの振幅
# 1.0 = 16bit フルスケール。設定ミスによる過大音量を防ぐため上限は 0.01 にクランプされる。
# 0.0001 ≒ -80 dBFS で人耳には不可聴。デフォルトは 0.0001。
silence_tone_amp = 0.0001

# 音声強調設定
# 再生時の WebRTC Audio Processing（APM）でノイズ抑制 + 自動ゲイン制御（AGC2）+ ハイパスフィルタを適用する。
# 話者間の音量バラつきを自動で均し、小音量の発言を持ち上げる。
# 強度切替（Off/小/中/大）は N キーで実行する。本セクションでは強度別のパラメータのみ指定する。
[speech_enhance]
# ノイズ抑制レベル（小）
# 0=Off / 1=Low / 2=Moderate / 3=High。0〜3 にクランプ。デフォルトは 1。
ns_level_small = 1
# ノイズ抑制レベル（中）
# デフォルトは 2。
ns_level_medium = 2
# ノイズ抑制レベル（大）
# デフォルトは 2。
ns_level_large = 2
# AGC2 固定デジタルゲイン（小、dB）
# adaptive ゲインに加算する固定ブースト量。0.0〜30.0 にクランプ。デフォルトは 0.0。
fixed_gain_db_small = 0.0
# AGC2 固定デジタルゲイン（中、dB）
# デフォルトは 3.0。
fixed_gain_db_medium = 3.0
# AGC2 固定デジタルゲイン（大、dB）
# デフォルトは 6.0。
fixed_gain_db_large = 6.0
# AGC2 adaptive デジタルの最大ゲイン（小、dB）
# 小音量の発言を持ち上げる adaptive ゲインの上限。0.0〜50.0 にクランプ。デフォルトは 30.0。
max_gain_db_small = 30.0
# AGC2 adaptive デジタルの最大ゲイン（中、dB）
# デフォルトは 40.0。
max_gain_db_medium = 40.0
# AGC2 adaptive デジタルの最大ゲイン（大、dB）
# デフォルトは 50.0。
max_gain_db_large = 50.0
