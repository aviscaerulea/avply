# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# vcutter 設定ファイル
##################################################
#
# ローカル PC 固有のパスは vcutter.local.toml に記載すると、
# このファイルの値を後勝ちで上書きできる（VCS 管理外）。

# ffmpeg 設定
[ffmpeg]
# ffmpeg.exe のフルパス
# 動画変換に使用する ffmpeg.exe を指定する。
# 空文字または未設定の場合は scoop デフォルト
# （%USERPROFILE%/scoop/apps/ffmpeg/current/bin/ffmpeg.exe）にフォールバックする。
path = ""

# シーク設定
[seek]
# 左カーソルキーで巻き戻すミリ秒数
# 動画の再生位置をこの値だけ前に戻す。0 以下にするとシーク無効。デフォルトは 5000。
left_ms = 5000
# 右カーソルキーで早送るミリ秒数
# 動画の再生位置をこの値だけ後ろに進める。0 以下にするとシーク無効。デフォルトは 5000。
right_ms = 5000
