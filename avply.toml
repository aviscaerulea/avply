# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# avply 設定ファイル
##################################################
# ローカル PC 固有のパスは avply.local.toml に記載すると、
# このファイルの値を後勝ちで上書きできる（VCS 管理外）。

# ffmpeg 設定
[ffmpeg]
# ffmpeg.exe のフルパス
# 動画変換に使用する ffmpeg.exe を指定する。
path = ""

# シーク設定
[seek]
# 左カーソルキーで巻き戻すミリ秒数
# 動画の再生位置をこの値だけ前に戻す。0 以下にするとシーク無効。デフォルトは 5000。
left_ms = 5000
# 右カーソルキーで早送るミリ秒数
# 動画の再生位置をこの値だけ後ろに進める。0 以下にするとシーク無効。デフォルトは 5000。
right_ms = 5000
# マウスホイール前転（上スクロール）で早送るミリ秒数
# シークバーおよびプレビュー領域のホイールに適用する。0 以下にするとシーク無効。デフォルトは 5000。
wheel_forward_ms = 5000
# マウスホイール後転（下スクロール）で巻き戻すミリ秒数
# シークバーおよびプレビュー領域のホイールに適用する。0 以下にするとシーク無効。デフォルトは 5000。
wheel_back_ms = 5000

# 再生設定
[playback]
# 動画読込時の初期再生速度
# 1.00 で等速、0.05 単位で上下キーから調整可能。デフォルトは 1.00。
speed = 1.00

# ウィンドウ設定
[window]
# 動画読込時の初期ウィンドウサイズ上限のモニタ比率
# モニタ作業領域（タスクバー除外）に対するウィンドウ幅・高さの上限比率を指定する。
# 例：0.7 ならモニタの 70% を上限としてアスペクト比維持で縮める。デフォルトは 0.7。
# 0.1〜1.0 にクランプされる（範囲外は近い境界値に丸める）。
initial_screen_ratio = 0.7

# 音声設定
[audio]
# 再生音量
# 1.00 で 100%、0.50 で 50%。再生中は Shift+カーソルキー（上下）で 0.05 単位で調整できる。
# 0.00〜1.00 にクランプされる（範囲外は近い境界値に丸める）。デフォルトは 1.00。
volume = 1.00
